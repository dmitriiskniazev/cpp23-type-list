name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_VERSION: '22'

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: ./scripts/install-llvm-apt.sh
        env:
          LLVM_VERSION: ${{ env.LLVM_VERSION }}

      - name: Check formatting
        run: ./scripts/format-check.sh

      - name: Check for disallowed #include
        run: ./scripts/check-no-includes.sh

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            compiler: /opt/homebrew/opt/llvm/bin/clang++
          - os: ubuntu-latest
            compiler: clang++
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm ninja cmake

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: ./scripts/install-llvm-apt.sh
        env:
          LLVM_VERSION: ${{ env.LLVM_VERSION }}

      - name: Install CMake (Ubuntu)
        if: runner.os == 'Linux'
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 4.3.2

      - name: Configure
        run: |
          extra_args=()
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            modules_json="$(dpkg -L "libc++-${{ env.LLVM_VERSION }}-dev" | grep 'libc++.modules.json$' | head -1)"
            if [[ -z "$modules_json" || ! -f "$modules_json" ]]; then
              echo "libc++.modules.json not found in libc++-${{ env.LLVM_VERSION }}-dev package" >&2
              dpkg -L "libc++-${{ env.LLVM_VERSION }}-dev" | grep -i module || true
              exit 1
            fi
            echo "Using libc++ modules metadata: $modules_json"
            extra_args+=("-DCMAKE_CXX_STDLIB_MODULES_JSON=${modules_json}")
          fi
          cmake -B build -G Ninja \
            -DCMAKE_CXX_COMPILER="${{ matrix.compiler }}" \
            "${extra_args[@]}"


      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
